<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Stop e-Border Chatbot</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-wrapper.user {
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-items: flex-start;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            background: #e2e8f0;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        /* Style riêng cho các nút bấm Interactive */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            max-width: 85%;
        }

        .chat-btn {
            background: #fff;
            color: var(--primary-color);
            border: 1.5px solid var(--primary-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-btn:hover {
            background: var(--primary-color);
            color: #fff;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
        }

        .chat-input-area button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .loading {
            font-size: 0.85rem;
            color: #666;
            margin-left: 10px;
            margin-bottom: 10px;
            display: none;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">Zero-Stop e-Border Assistant</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message-wrapper bot">
                <div class="message bot">Xin chào! Tôi là trợ lý AI. Vui lòng nhập tên và mô tả mặt hàng nông sản bạn
                    cần tra cứu mã HS.</div>
            </div>
        </div>
        <div class="loading" id="loading">Hệ thống đang xử lý...</div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Nhập thông tin hàng hóa..."
                onkeypress="handleKeyPress(event)">
            <button onclick="handleSendText()">Gửi</button>
        </div>
    </div>

    <script>
        // 1. DÁN ĐƯỜNG LINK WEBHOOK TỪ N8N VÀO ĐÂY
        const N8N_WEBHOOK_URL = 'https://vanle044.app.n8n.cloud/webhook/6568dd1c-79bc-4110-a71f-733a9825d29a';

        let sessionId = localStorage.getItem('chatbot_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('chatbot_session_id', sessionId);
        }

        const messagesContainer = document.getElementById('chat-messages');
        const inputField = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading');

        function handleKeyPress(event) {
            if (event.key === 'Enter') handleSendText();
        }

        function handleSendText() {
            const text = inputField.value.trim();
            if (!text) return;
            inputField.value = '';

            // Gửi dạng 'text'
            sendDataToServer('text', text, text);
        }

        // Hàm render giao diện tin nhắn và nút bấm
        function appendMessage(sender, text, buttons = []) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', sender);

            // Render bong bóng chat
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            // Dùng replace để hiển thị thẻ xuống dòng (\n) từ n8n
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            wrapper.appendChild(msgDiv);

            // Render nút bấm nếu có
            if (buttons.length > 0 && sender === 'bot') {
                const btnGroup = document.createElement('div');
                btnGroup.classList.add('button-group');

                buttons.forEach(btn => {
                    const btnEle = document.createElement('button');
                    btnEle.classList.add('chat-btn');
                    btnEle.textContent = btn.label;

                    // Khi khách bấm nút, gửi mã lệnh chìm (action) lên server
                    btnEle.onclick = () => {
                        // Ẩn dàn nút đi để khách không bấm 2 lần
                        btnGroup.style.display = 'none';
                        // Gửi dạng 'button' với mã lệnh tương ứng
                        sendDataToServer('button', btn.action, `[Đã chọn: ${btn.label}]`);
                    };

                    btnGroup.appendChild(btnEle);
                });
                wrapper.appendChild(btnGroup);
            }

            messagesContainer.appendChild(wrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Hàm gọi API lên n8n
        async function sendDataToServer(type, payloadData, displayText) {
            // Hiển thị tin nhắn người dùng lên màn hình
            appendMessage('user', displayText);
            loadingIndicator.style.display = 'block';

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        type: type,       // Sẽ là 'text' (khi gõ chữ) hoặc 'button' (khi click nút)
                        data: payloadData // Chứa chữ khách gõ, hoặc mã action của nút (VD: CONFIRM_HS)
                    })
                });

                const data = await response.json();
                loadingIndicator.style.display = 'none';

                // Hiển thị câu trả lời và tạo nút bấm dựa trên mảng "buttons" n8n trả về
                if (data.reply) {
                    appendMessage('bot', data.reply, data.buttons || []);
                }
            } catch (error) {
                loadingIndicator.style.display = 'none';
                appendMessage('bot', 'Lỗi kết nối tới hệ thống hải quan. Vui lòng thử lại sau.');
                console.error('Error:', error);
            }
        }
    </script>

</body>

</html>
